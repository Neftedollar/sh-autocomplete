name: Bug Report
description: Report an autocomplete misfire, install crash, or performance regression.
title: "[Bug]: "
labels:
  - beta-feedback
body:
  - type: dropdown
    id: shell
    attributes:
      label: Shell
      description: Which shell are you using?
      options:
        - zsh
        - bash
        - fish
    validations:
      required: true

  - type: input
    id: shell-version
    attributes:
      label: Shell version
      description: Output of `zsh --version` (or equivalent for your shell).
      placeholder: "zsh 5.9 (x86_64-apple-darwin23.0)"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS and version
      placeholder: "macOS 14.4.1 / Ubuntu 22.04"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - "Homebrew via Neftedollar/homebrew-shac"
        - "curl | sh"
        - "Source build"
    validations:
      required: true

  - type: input
    id: shac-version
    attributes:
      label: shac version
      description: Output of `shac --version`.
      placeholder: "shac 0.1.3"
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open a new terminal session
        2. Type `git che` and press Tab
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal / multiplexer (optional)
      description: e.g. iTerm2, Alacritty, tmux, Warp, Ghostty
      placeholder: "iTerm2 3.5.2 + tmux 3.4"
